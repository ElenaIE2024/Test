name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Restore NuGet packages
      run: nuget restore GradeAnalyzer/GradeAnalyzer.sln

    - name: Build
      run: msbuild GradeAnalyzer/GradeAnalyzer.sln /p:Configuration=Release /t:Rebuild

  